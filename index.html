<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>구내식당 맵</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<meta property="og:title" content="구내식당 맵"/>
<meta property="og:description" content="여의도 직장인을 위한 점심 위키 | 전국 서비스로 확대 중"/>
<meta property="og:image" content="https://cafeteria-map.vercel.app/logo.png"/>
<meta property="og:url" content="https://cafeteria-map.vercel.app"/>
<meta property="og:type" content="website"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#059669;--green-dark:#047857;--green-light:#ecfdf5;--green-text:#065f46;
  --orange:#f97316;--red:#ef4444;
  --slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-400:#94a3b8;--slate-500:#64748b;--slate-600:#475569;--slate-800:#1e293b;--slate-900:#0f172a;
  --white:#fff;--shadow:0 -10px 40px rgba(0,0,0,0.1);
}
body{font-family:'Nanum Gothic',sans-serif;background:var(--slate-50);color:var(--slate-900);height:100dvh;overflow:hidden;display:flex;flex-direction:column;position:relative;}

/* 토스트 */
#toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:var(--slate-800);color:#fff;padding:10px 24px;border-radius:999px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
#toast.show{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) scale(0.9);}to{opacity:1;transform:translateX(-50%) scale(1);}}

/* 헤더 */
#header{background:var(--white);padding:14px 16px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);z-index:20;flex-shrink:0;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px;gap:8px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon-wrap{background:var(--green);padding:6px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-icon{width:20px;height:20px;filter:brightness(0) invert(1);}
.logo img.logo-img{width:36px;height:36px;border-radius:10px;object-fit:cover;}
.logo-text h1{font-size:19px;font-weight:800;color:var(--green-text);letter-spacing:-0.5px;}
.logo-text p{font-size:11px;color:var(--slate-400);margin-top:1px;}
.report-btn{display:flex;align-items:center;gap:5px;background:var(--green-light);color:var(--green);border:none;border-radius:999px;padding:8px 12px;font-size:12px;font-family:'Nanum Gothic',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.report-btn:active{transform:scale(0.95);}

/* 검색 */
.search-wrap{position:relative;margin:12px 0 10px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--slate-400);}
.search-wrap input{width:100%;background:var(--slate-100);border:none;border-radius:14px;padding:10px 14px 10px 38px;font-size:14px;font-family:'Nanum Gothic',sans-serif;color:var(--slate-900);outline:none;}
.search-wrap input:focus{box-shadow:0 0 0 2px var(--green);}
.search-wrap input::placeholder{color:var(--slate-400);}

/* 필터 */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
.filters::-webkit-scrollbar{display:none;}
.chip{background:var(--white);border:1.5px solid var(--slate-200);border-radius:999px;padding:4px 12px;font-size:12px;font-family:'Nanum Gothic',sans-serif;font-weight:700;cursor:pointer;color:var(--slate-600);white-space:nowrap;transition:all .15s;}
.chip.active{background:var(--green);border-color:var(--green);color:var(--white);box-shadow:0 4px 12px rgba(5,150,105,0.3);}
.chip.active .dot-green,.chip.active .dot-orange{background:#fff !important;}

/* 지도 */
#map{flex:1;position:relative;}

/* 하단 패널 */
#panel{background:var(--white);border-radius:22px 22px 0 0;box-shadow:var(--shadow);position:fixed;bottom:0;left:0;right:0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:65vh;overflow-y:auto;z-index:200;}
#panel.open{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--slate-200);border-radius:999px;margin:10px auto 12px;}

.panel-body{padding:0 16px 20px;}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.panel-left h2{font-size:18px;font-weight:800;color:var(--slate-900);line-height:1.2;margin-bottom:2px;}
.panel-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.panel-price{font-size:17px;font-weight:800;color:var(--green);}
.close-btn{background:none;border:none;cursor:pointer;color:var(--slate-300);padding:2px;}
.close-btn:hover{color:var(--slate-500);}

/* 정보 카드 */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.info-card{background:var(--slate-50);border:1px solid var(--slate-100);border-radius:12px;padding:10px 12px;}
.info-card-label{font-size:10px;color:var(--slate-400);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.info-card-value{font-size:13px;font-weight:800;color:var(--slate-800);}

/* 혼잡도 */
.crowd-section{background:var(--slate-50);border:1px solid var(--slate-100);border-radius:14px;padding:12px;margin-bottom:16px;}
.crowd-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.crowd-title{font-size:13px;font-weight:800;color:var(--slate-800);display:flex;align-items:center;gap:5px;}
.crowd-updated{font-size:10px;color:var(--slate-400);background:var(--white);border:1px solid var(--slate-100);border-radius:999px;padding:3px 10px;display:flex;align-items:center;gap:3px;}
.crowd-bar-track{height:10px;background:var(--slate-200);border-radius:999px;overflow:hidden;margin-bottom:8px;}
.crowd-bar-fill{height:100%;border-radius:999px;transition:width .8s ease;}
.crowd-labels{display:flex;justify-content:space-between;padding:0 2px;}
.crowd-labels span{font-size:11px;font-weight:700;color:var(--slate-400);}
.crowd-labels span.active-label{color:inherit;}

/* 버튼 */
.action-btns{display:flex;gap:12px;}
.nav-btn{flex:1;background:var(--green);color:#fff;border:none;border-radius:14px;padding:13px;font-size:15px;font-family:'Black Han Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(5,150,105,0.25);transition:all .15s;}
.nav-btn:active{transform:scale(0.98);background:var(--green-dark);}
.share-btn{width:46px;height:46px;background:var(--white);border:1.5px solid var(--slate-200);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--slate-500);transition:all .15s;flex-shrink:0;}
.share-btn:active{transform:scale(0.95);}

/* 댓글 섹션 */
.comment-section{padding:0 20px 4px;}
.comment-title{font-size:13px;font-weight:800;color:var(--slate-800);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.comment-login-btn{display:flex;align-items:center;gap:6px;background:#FEE500;color:#1a1a1a;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-family:"Nanum Gothic",sans-serif;font-weight:700;cursor:pointer;width:100%;justify-content:center;margin-bottom:12px;}
.comment-input-wrap{display:flex;gap:8px;margin-bottom:12px;}
.comment-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.comment-avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--slate-200);flex-shrink:0;}
.comment-input{flex:1;border:1.5px solid var(--slate-200);border-radius:12px;padding:8px 12px;font-size:13px;font-family:"Nanum Gothic",sans-serif;outline:none;resize:none;height:38px;}
.comment-input:focus{border-color:var(--green);}
.comment-send-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:12px;font-family:"Nanum Gothic",sans-serif;font-weight:700;cursor:pointer;flex-shrink:0;}
.comment-list{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto;margin-top:8px;}
.comment-item{display:flex;align-items:flex-start;}
.comment-item img{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.comment-bubble{background:var(--slate-50);border-radius:12px;padding:8px 12px;flex:1;}
.comment-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.comment-name{font-size:12px;font-weight:700;color:var(--slate-700);}
.comment-time{font-size:11px;color:var(--slate-400);}
.comment-text{font-size:13px;color:var(--slate-800);line-height:1.4;}
.comment-empty{font-size:13px;color:var(--slate-400);text-align:center;padding:16px 0;}
.divider{height:1px;background:var(--slate-100);margin:0 20px 12px;}

/* 제보 모달 */
#moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;}
#moverlay.open{display:flex;}
#modal{background:var(--white);border-radius:28px 28px 0 0;padding:24px 20px 40px;width:100%;max-height:88vh;overflow-y:auto;}
#modal h2{font-size:20px;font-weight:800;margin-bottom:4px;color:var(--slate-900);}
#modal>p{font-size:13px;color:var(--slate-400);margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--slate-500);margin-bottom:6px;}
.fg input,.fg textarea,.fg select{width:100%;border:1.5px solid var(--slate-200);border-radius:14px;padding:12px 14px;font-size:14px;font-family:'Nanum Gothic',sans-serif;color:var(--slate-900);outline:none;background:var(--white);}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--green);}
.fg textarea{height:80px;resize:none;}
.mbtns{display:flex;gap:10px;margin-top:20px;}
.mcancel{flex:1;background:var(--slate-100);border:none;border-radius:14px;padding:14px;font-size:14px;font-family:'Nanum Gothic',sans-serif;cursor:pointer;color:var(--slate-500);font-weight:700;}
.msubmit{flex:2;background:var(--green);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-family:'Black Han Sans',sans-serif;cursor:pointer;box-shadow:0 4px 12px rgba(5,150,105,0.3);}
</style>
</head>
<body>

<div id="toast"></div>

<div id="header">
  <div class="header-top">
    <div class="logo">
      <img src="logo.png" class="logo-img" alt="로고" onerror="this.style.display='none'"/>
      <div class="logo-text">
        <h1>구내식당 맵</h1>
        <p>여의도 직장인을 위한 점심 위키 | 전국 서비스로 확대 중</p>
      </div>
    </div>
    <button class="report-btn" onclick="openModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      제보하기
    </button>
  </div>
  <div style="display:flex;gap:8px;padding:0 16px;margin:10px 0 0;">
    <div class="search-wrap" style="flex:1;margin:0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="search" placeholder="식당명 또는 건물명 검색" oninput="searchCafeteria(this.value)"/>
    </div>
    <button id="view-toggle-btn" onclick="toggleView()" style="background:var(--white);border:1.5px solid var(--slate-200);border-radius:12px;width:46px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--slate-500);">
      <svg id="view-icon-list" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
      <svg id="view-icon-map" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
    </button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;padding:8px 16px 10px;">
    <div class="filters" style="flex:1;padding:0;">
      <button class="chip active" onclick="setFilter('all',this)">전체</button>
      <button class="chip" onclick="setFilter('cheap',this)"><span class="dot-green" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#059669;margin-right:5px;vertical-align:middle;"></span>~6,000원</button>
      <button class="chip" onclick="setFilter('mid',this)"><span class="dot-orange" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f97316;margin-right:5px;vertical-align:middle;"></span>~8,000원</button>
    </div>
    <span id="result-count" style="font-size:11px;color:var(--slate-400);font-weight:700;white-space:nowrap;flex-shrink:0;">17개</span>
  </div>
</div>

<div id="map"></div>
<div id="footer" style="position:fixed;bottom:0;left:0;right:0;padding:6px 16px;background:rgba(255,255,255,0.9);text-align:center;font-size:11px;color:#94a3b8;z-index:50;pointer-events:none;">
  © 구내식당맵 · 문의: <a href="mailto:yeouido.eat@gmail.com" style="color:#94a3b8;text-decoration:none;pointer-events:auto;">yeouido.eat@gmail.com</a>
</div>
<div id="list-view" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:auto;background:var(--slate-50);padding:12px 16px 80px;z-index:10;">
</div>

<div id="panel">
  <div class="panel-handle" onclick="closePanel()"></div>
  <div class="panel-body">
    <div class="panel-top">
      <div class="panel-left" style="display:flex;align-items:baseline;gap:8px;flex:1;flex-wrap:wrap;">
        <h2 id="pname"></h2>
        <div class="panel-price" id="pprice"></div>
      </div>
      <button class="close-btn" onclick="closePanel()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div id="p-rating-wrap" style="margin-bottom:10px;font-size:13px;color:var(--slate-500);"></div>
    <div id="paddr-wrap" style="background:var(--slate-50);border:1px solid var(--slate-100);border-radius:12px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <div style="display:flex;align-items:center;gap:6px;flex:1;overflow:hidden;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="flex-shrink:0;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        <span id="paddr" style="font-size:12px;color:var(--slate-500);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </div>
      <button onclick="copyAddress()" style="background:none;border:none;cursor:pointer;color:var(--green);font-size:12px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:3px;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        복사
      </button>
    </div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          운영 시간
        </div>
        <div class="info-card-value" id="phours"></div>
      </div>
      <div class="info-card">
        <div class="info-card-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
          현재 거리
        </div>
        <div class="info-card-value" id="pdist">계산 중...</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span style="font-size:12px;color:var(--slate-500);white-space:nowrap;">혼잡도</span>
      <div class="crowd-bar-track" style="flex:1;">
        <div class="crowd-bar-fill" id="pcrowd-bar"></div>
      </div>
      <span id="pcrowd-label" style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap;"></span>
    </div>

    <div class="divider"></div>
    <div class="comment-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#059669;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span style="font-size:15px;font-weight:800;color:var(--slate-900);">댓글</span>
        </div>
        <span id="comment-count" style="font-size:12px;color:var(--slate-500);background:var(--slate-100);padding:2px 10px;border-radius:20px;"></span>
      </div>
      <div style="background:var(--slate-50);border:1px solid var(--slate-100);border-radius:14px;padding:10px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--slate-200);">
          <input type="text" id="comment-nickname" placeholder="닉네임" style="border:none;background:transparent;font-size:13px;font-family:'Nanum Gothic',sans-serif;outline:none;flex:1;min-width:0;color:var(--slate-900);"/>
          <div id="star-rating" style="display:flex;gap:2px;flex-shrink:0;">
            <span class="star-btn" onclick="setStar(1)" style="font-size:18px;cursor:pointer;color:#e2e8f0;line-height:1;">★</span>
            <span class="star-btn" onclick="setStar(2)" style="font-size:18px;cursor:pointer;color:#e2e8f0;line-height:1;">★</span>
            <span class="star-btn" onclick="setStar(3)" style="font-size:18px;cursor:pointer;color:#e2e8f0;line-height:1;">★</span>
            <span class="star-btn" onclick="setStar(4)" style="font-size:18px;cursor:pointer;color:#e2e8f0;line-height:1;">★</span>
            <span class="star-btn" onclick="setStar(5)" style="font-size:18px;cursor:pointer;color:#e2e8f0;line-height:1;">★</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="text" id="comment-text" placeholder="댓글을 입력해주세요..." style="flex:1;border:none;background:transparent;outline:none;font-size:13px;font-family:'Nanum Gothic',sans-serif;color:var(--slate-900);"/>
          <button class="comment-send-btn" onclick="submitComment()">등록</button>
        </div>
      </div>
      <div class="comment-list" id="comment-list">
        <div class="comment-empty">첫 번째 댓글을 남겨보세요!</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="action-btns">
      <button class="nav-btn" onclick="startNav()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
        길 찾기 시작
      </button>
      <button class="share-btn" onclick="shareLink()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      </button>
    </div>
  </div>
</div>

<div id="moverlay" onclick="if(event.target===this)closeModal()">

function getPinColor(c) {

function getCrowdColor(crowd) {

  return '#ef4444';
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const d = R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return d < 1000 ? '약 '+Math.round(d)+'m' : '약 '+(d/1000).toFixed(1)+'km';
}

function updateDist(c) {
  if(userLat && c.lat) {

}

async function loadComments(cafeId) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/comments?cafeteria_id=eq.${cafeId}&order=created_at.desc&limit=20`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    const list = document.getElementById('comment-list');
    const count = document.getElementById('comment-count');
    const ratingWrap = document.getElementById('p-rating-wrap');

    if(!data || data.length === 0) {
      list.innerHTML = '<div class="comment-empty">첫 번째 댓글을 남겨보세요!</div>';
      count.textContent = '';
      if(ratingWrap) { ratingWrap.innerHTML = ''; ratingWrap.style.marginBottom = '0'; }
      return;
    }

    // 별점 평균 계산 (전체 댓글 수 + 별점 있는 것만 평균)
    const rated = data.filter(c => c.rating);
    const totalCount = data.length;
    if(ratingWrap) {
      if(rated.length > 0) {
        const avg = (rated.reduce((s, c) => s + c.rating, 0) / rated.length).toFixed(1);
        const stars = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));
        ratingWrap.innerHTML = `<span style="color:#f59e0b;font-weight:700;">${stars}</span> <span style="font-weight:700;">${avg}</span> <span style="color:var(--slate-400);">(댓글 ${totalCount}개)</span>`;
      } else {
        ratingWrap.innerHTML = `<span style="color:var(--slate-400);">댓글 ${totalCount}개</span>`;
      }
      ratingWrap.style.marginBottom = '4px';
    }
    count.textContent = data.length + '개';
    const myComments = JSON.parse(localStorage.getItem('my_comments') || '[]');
    list.innerHTML = data.map(c => {
      const time = new Date(c.created_at);
      const diff = Math.floor((Date.now() - time) / 60000);
      const timeStr = diff < 1 ? '방금' : diff < 60 ? diff + '분 전' : Math.floor(diff/60) + '시간 전';
      const isMine = myComments.includes(c.id);
      return `<div class="comment-item" id="comment-${c.id}" style="display:flex;align-items:flex-start;gap:6px;padding:7px 0;border-bottom:0.5px solid var(--slate-100);">
        <div style="flex:1;font-size:13px;color:var(--slate-800);line-height:1.4;">
          <span style="font-weight:700;color:var(--slate-700);margin-right:4px;">${c.nickname || '익명'}</span>
          ${c.rating ? '<span style="color:#f59e0b;font-size:12px;margin-right:4px;">' + '★'.repeat(c.rating) + '</span>' : ''}
          ${c.content}
          <span style="color:var(--slate-400);font-size:11px;margin-left:4px;">${timeStr}</span>
        </div>
        ${isMine ? `<button onclick="deleteComment(${c.id})" style="background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:13px;padding:0;flex-shrink:0;">✕</button>` : ''}
      </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
  }
}

async function deleteComment(id) {
  if(!confirm('댓글을 삭제할까요?')) return;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/comments?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if(res.ok) {
      const myComments = JSON.parse(localStorage.getItem('my_comments') || '[]');
      localStorage.setItem('my_comments', JSON.stringify(myComments.filter(i => i !== id)));
      await loadComments(currentCafe.id);
      showToast('댓글이 삭제되었어요.');
    }
  } catch(e) {
    showToast('삭제 중 오류가 발생했어요.');
  }
}

async function submitComment() {
  const text = document.getElementById('comment-text').value.trim();
  if(!text) { showToast('댓글을 입력해주세요!'); return; }
  if(!currentCafe) return;

  const nickname = document.getElementById('comment-nickname').value.trim() || '익명';
  const btn = document.querySelector('.comment-send-btn');
  btn.disabled = true;

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/comments', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        cafeteria_id: currentCafe.id,
        nickname: nickname,
        content: text,
        profile_image: '',
        rating: selectedRating || null
      })
    });
    if(res.ok || res.status === 201) {
      document.getElementById('comment-text').value = '';
      setStar(0);
      // 내가 쓴 댓글 ID 로컬 저장
      const resData = await fetch(SUPABASE_URL + '/rest/v1/comments?cafeteria_id=eq.' + currentCafe.id + '&order=created_at.desc&limit=1', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const newComment = await resData.json();
      if(newComment && newComment[0]) {
        const myComments = JSON.parse(localStorage.getItem('my_comments') || '[]');
        myComments.push(newComment[0].id);
        localStorage.setItem('my_comments', JSON.stringify(myComments));
      }
      await loadComments(currentCafe.id);
      showToast('댓글이 등록되었어요! 😊');
    }
  } catch(e) {
    showToast('오류가 발생했어요.');
  } finally {
    btn.disabled = false;
  }
}

kakao.maps.load(function(){
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5255, 126.9200),
    level: 4
  });
  const ps = new kakao.maps.services.Places();
  let done = 0;
  cafeterias.forEach(cafe => {
    ps.keywordSearch(cafe.keyword, function(result, status){
      done++;
      if(status === kakao.maps.services.Status.OK && result.length > 0){
        cafe.lat = parseFloat(result[0].y);
        cafe.lng = parseFloat(result[0].x);
      } else {
        cafe.lat = 37.5255 + (Math.random()-0.5)*0.01;
        cafe.lng = 126.9200 + (Math.random()-0.5)*0.01;
      }
      resolvedData.push(cafe);
      if(done === cafeterias.length) render(resolvedData);
    }, { location: new kakao.maps.LatLng(37.5255, 126.9200), radius: 3000 });
  });
});
</script>
