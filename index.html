<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구내식당 맵 | 직장인 밥집 위키</title>
  <meta name="description" content="회사 밀집 지역 구내식당 정보 — 가격, 오늘의 메뉴, 혼잡도 한눈에 확인" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --green-mid: #52b788;
      --amber: #e76f00;
      --amber-light: #fff3e0;
      --red: #c1121f;
      --red-light: #ffe8e8;
      --gray: #f8f7f4;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --white: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Nanum Gothic', sans-serif;
      background: var(--gray);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 상단 헤더 */
    #header {
      background: var(--white);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e7eb;
      z-index: 100;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      flex-direction: column;
    }

    .logo h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 20px;
      color: var(--green);
      line-height: 1;
    }

    .logo p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-btns {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: 'Nanum Gothic', sans-serif;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-btn.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    /* 필터 바 */
    #filter-bar {
      background: var(--white);
      padding: 8px 14px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    #filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      background: var(--gray);
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: 'Nanum Gothic', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      color: var(--text);
    }

    .filter-chip.active {
      background: var(--green-light);
      border-color: var(--green);
      color: var(--green);
      font-weight: 700;
    }

    /* 지도 */
    #map {
      flex: 1;
      position: relative;
    }

    /* 하단 패널 */
    #bottom-panel {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid #e5e7eb;
      padding: 0 16px 24px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 200;
      flex-shrink: 0;
      max-height: 60vh;
      overflow-y: auto;
    }

    #bottom-panel.open {
      transform: translateY(0);
    }

    .panel-handle {
      width: 36px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin: 12px auto 14px;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .panel-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 18px;
      color: var(--text);
    }

    .panel-price {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 20px;
      color: var(--green);
    }

    .panel-rating {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .panel-rating span {
      color: var(--amber);
    }

    .crowd-section { margin-bottom: 12px; }

    .crowd-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .crowd-bar {
      height: 8px;
      background: #f3f4f6;
      border-radius: 4px;
      overflow: hidden;
    }

    .crowd-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .menu-section { margin-bottom: 14px; }

    .menu-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .menu-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .menu-chip {
      background: var(--green-light);
      color: var(--green);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .menu-chip.today {
      background: var(--green);
      color: white;
    }

    .report-btn {
      width: 100%;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    /* 제보 모달 */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      align-items: flex-end;
    }

    #modal-overlay.open {
      display: flex;
    }

    #modal {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    #modal h2 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--green);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: 'Nanum Gothic', sans-serif;
      color: var(--text);
      background: var(--gray);
    }

    .form-group textarea {
      height: 80px;
      resize: none;
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-cancel {
      flex: 1;
      background: var(--gray);
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      font-family: 'Nanum Gothic', sans-serif;
      cursor: pointer;
    }

    .modal-submit {
      flex: 2;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    /* 랭킹 패널 */
    #ranking-panel {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--white);
      border-radius: 14px;
      padding: 12px 14px;
      z-index: 150;
      min-width: 200px;
      box-shadow: var(--shadow);
    }

    #ranking-panel.open { display: block; }

    #ranking-panel h3 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 14px;
      color: var(--green);
      margin-bottom: 10px;
    }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
    }

    .rank-item:last-child { border-bottom: none; }

    .rank-num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .rank-num.gold { color: #f4a100; }
    .rank-num.silver { color: #9ca3af; }
    .rank-num.bronze { color: #b45309; }

    .rank-info { flex: 1; }
    .rank-name { font-size: 13px; font-weight: 700; }
    .rank-price { font-size: 11px; color: var(--text-muted); }
    .rank-score { font-size: 12px; color: var(--green); font-weight: 700; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">
    <h1>구내식당 맵</h1>
    <p>직장인 밥집 위키</p>
  </div>
  <div class="header-btns">
    <button class="header-btn" id="ranking-btn" onclick="toggleRanking()">🏆 랭킹</button>
    <button class="header-btn" onclick="openModal()">📢 제보하기</button>
  </div>
</div>

<div id="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all', this)">전체</button>
  <button class="filter-chip" onclick="setFilter('cheap', this)">~5,000원</button>
  <button class="filter-chip" onclick="setFilter('mid', this)">~7,000원</button>
  <button class="filter-chip" onclick="setFilter('low', this)">여유있음</button>
  <button class="filter-chip" onclick="setFilter('high', this)">⭐ 4.5이상</button>
</div>

<div id="map"></div>

<div id="bottom-panel">
  <div class="panel-handle"></div>
  <div class="panel-top">
    <div class="panel-name" id="p-name"></div>
    <div class="panel-price" id="p-price"></div>
  </div>
  <div class="panel-rating" id="p-rating"></div>
  <div class="crowd-section">
    <div class="crowd-label">
      <span>혼잡도</span>
      <span id="p-crowd-label"></span>
    </div>
    <div class="crowd-bar">
      <div class="crowd-fill" id="p-crowd-bar"></div>
    </div>
  </div>
  <div class="menu-section">
    <div class="menu-label">오늘의 메뉴</div>
    <div class="menu-chips" id="p-menus"></div>
  </div>
  <button class="report-btn" onclick="openModal()">📢 정보 제보하기</button>
</div>

<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal">
    <h2>📢 식당 정보 제보</h2>
    <div class="form-group">
      <label>식당 이름</label>
      <input type="text" placeholder="예: 테크밸리 A동 구내식당" id="f-name" />
    </div>
    <div class="form-group">
      <label>오늘의 메뉴</label>
      <input type="text" placeholder="예: 제육볶음, 된장찌개, 공기밥" id="f-menu" />
    </div>
    <div class="form-group">
      <label>가격</label>
      <input type="text" placeholder="예: 5,500원" id="f-price" />
    </div>
    <div class="form-group">
      <label>혼잡도</label>
      <select id="f-crowd">
        <option value="">선택해주세요</option>
        <option value="여유">여유</option>
        <option value="보통">보통</option>
        <option value="혼잡">혼잡</option>
      </select>
    </div>
    <div class="form-group">
      <label>추가 정보 (선택)</label>
      <textarea placeholder="맛, 분위기, 특이사항 등 자유롭게 적어주세요"></textarea>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-submit" onclick="submitReport()">제보하기</button>
    </div>
  </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2a9cb37b21dd68ec0f21be70c2fe3ac1&libraries=services"></script>
<script>
const cafeterias = [
  {
    id: 1,
    name: "테크밸리 A동 구내식당",
    lat: 37.5245,
    lng: 126.9220,
    price: 4500,
    priceLabel: "4,500원",
    crowd: 35,
    crowdLabel: "여유",
    crowdColor: "#2d6a4f",
    rating: 4.8,
    reviewCount: 234,
    menus: ["제육볶음 (오늘)", "된장찌개", "비빔밥", "공기밥"],
    rank: 1,
  },
  {
    id: 2,
    name: "이노파크 구내식당",
    lat: 37.5265,
    lng: 126.9250,
    price: 5000,
    priceLabel: "5,000원",
    crowd: 42,
    crowdLabel: "여유",
    crowdColor: "#2d6a4f",
    rating: 4.6,
    reviewCount: 178,
    menus: ["갈비탕 (오늘)", "김치찌개", "쌀국수"],
    rank: 2,
  },
  {
    id: 3,
    name: "중앙광장 구내식당",
    lat: 37.5230,
    lng: 126.9260,
    price: 5500,
    priceLabel: "5,500원",
    crowd: 65,
    crowdLabel: "보통",
    crowdColor: "#e76f00",
    rating: 4.3,
    reviewCount: 121,
    menus: ["불고기 (오늘)", "미역국", "잡채"],
    rank: 3,
  },
  {
    id: 4,
    name: "센터빌딩 4층 식당",
    lat: 37.5255,
    lng: 126.9195,
    price: 6000,
    priceLabel: "6,000원",
    crowd: 75,
    crowdLabel: "보통",
    crowdColor: "#e76f00",
    rating: 4.1,
    reviewCount: 89,
    menus: ["돈까스 (오늘)", "순두부찌개", "볶음밥"],
    rank: null,
  },
  {
    id: 5,
    name: "그린파크 식당",
    lat: 37.5215,
    lng: 126.9235,
    price: 4800,
    priceLabel: "4,800원",
    crowd: 28,
    crowdLabel: "여유",
    crowdColor: "#2d6a4f",
    rating: 4.0,
    reviewCount: 67,
    menus: ["닭갈비 (오늘)", "콩나물국", "잡채"],
    rank: null,
  },
  {
    id: 6,
    name: "글로벌타워 레스토랑",
    lat: 37.5240,
    lng: 126.9275,
    price: 7500,
    priceLabel: "7,500원",
    crowd: 88,
    crowdLabel: "혼잡",
    crowdColor: "#c1121f",
    rating: 3.5,
    reviewCount: 45,
    menus: ["스테이크 (오늘)", "파스타", "샐러드바"],
    rank: null,
  },
];

let currentFilter = 'all';
let map, markers = [];

kakao.maps.load(() => {
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5240, 126.9235),
    level: 4,
  });
  renderMarkers();
});

function getBadgeColor(price) {
  if (price <= 5000) return { bg: '#d8f3dc', border: '#2d6a4f', text: '#1b4332' };
  if (price <= 7000) return { bg: '#fff3e0', border: '#e76f00', text: '#7c3800' };
  return { bg: '#ffe8e8', border: '#c1121f', text: '#7f1d1d' };
}

function renderMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];

  const filtered = cafeterias.filter(c => {
    if (currentFilter === 'cheap') return c.price <= 5000;
    if (currentFilter === 'mid') return c.price <= 7000;
    if (currentFilter === 'low') return c.crowd < 50;
    if (currentFilter === 'high') return c.rating >= 4.5;
    return true;
  });

  filtered.forEach(cafe => {
    const col = getBadgeColor(cafe.price);
    const rankBadge = cafe.rank
      ? `<div style="position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;font-family:'Nanum Gothic',sans-serif;">지역 ${cafe.rank}위</div>`
      : '';

    const content = `
      <div style="position:relative;cursor:pointer;" onclick="openPanel(${cafe.id})">
        ${rankBadge}
        <div style="display:flex;align-items:center;gap:5px;padding:5px 10px;background:${col.bg};border:2px solid ${col.border};border-radius:20px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;color:${col.text};white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
          <div style="width:7px;height:7px;border-radius:50%;background:${col.border};"></div>
          ${cafe.priceLabel}
        </div>
      </div>`;

    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(cafe.lat, cafe.lng),
      content,
      yAnchor: 1.3,
    });
    overlay.setMap(map);
    markers.push(overlay);
  });
}

function openPanel(id) {
  const c = cafeterias.find(x => x.id === id);
  if (!c) return;

  document.getElementById('p-name').textContent = c.name;
  document.getElementById('p-price').textContent = c.priceLabel;
  document.getElementById('p-rating').innerHTML = `<span>${'★'.repeat(Math.round(c.rating))}${'☆'.repeat(5 - Math.round(c.rating))}</span> ${c.rating} · 리뷰 ${c.reviewCount}개`;

  const bar = document.getElementById('p-crowd-bar');
  bar.style.width = c.crowd + '%';
  bar.style.background = c.crowdColor;
  document.getElementById('p-crowd-label').textContent = c.crowdLabel;

  const menuEl = document.getElementById('p-menus');
  menuEl.innerHTML = c.menus.map(m =>
    m.includes('(오늘)')
      ? `<span class="menu-chip today">${m.replace(' (오늘)', '')}</span>`
      : `<span class="menu-chip">${m}</span>`
  ).join('');

  document.getElementById('bottom-panel').classList.add('open');

  map.panTo(new kakao.maps.LatLng(c.lat, c.lng));
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMarkers();
}

function toggleRanking() {
  const panel = document.getElementById('ranking-panel');
  if (!panel) {
    const el = document.createElement('div');
    el.id = 'ranking-panel';
    el.className = 'open';
    el.innerHTML = `
      <h3>🏆 이 지역 TOP 3</h3>
      ${cafeterias.filter(c => c.rank).sort((a,b) => a.rank - b.rank).map(c => `
        <div class="rank-item" onclick="openPanel(${c.id})">
          <div class="rank-num ${c.rank===1?'gold':c.rank===2?'silver':'bronze'}">${c.rank}</div>
          <div class="rank-info">
            <div class="rank-name">${c.name}</div>
            <div class="rank-price">${c.priceLabel}</div>
          </div>
          <div class="rank-score">★${c.rating}</div>
        </div>`).join('')}
    `;
    document.getElementById('map').appendChild(el);
    document.getElementById('ranking-btn').classList.add('active');
  } else {
    panel.remove();
    document.getElementById('ranking-btn').classList.remove('active');
  }
}

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function submitReport() {
  const name = document.getElementById('f-name').value;
  const menu = document.getElementById('f-menu').value;
  const price = document.getElementById('f-price').value;
  if (!name || !menu || !price) {
    alert('식당 이름, 메뉴, 가격은 필수예요!');
    return;
  }
  alert('제보해주셔서 감사해요! 검토 후 반영할게요 🙏');
  closeModal();
}

document.getElementById('bottom-panel').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
</script>
</body>
</html>
